<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>In Motion - A股产业链新闻智能分析</title>
  <style>
    :root {
      --bg: #FAFAFB;
      --surface: #FFFFFF;
      --line: #EDE9F5;
      --nav: #12121F;
      --primary: #6D28D9;
      --primary-hover: #7C3AED;
      --secondary: #8B5CF6;
      --tag-bg: #F3F0FF;
      --tag-line: #DDD6FE;
      --text: #1E1B2E;
      --muted: #6B6478;
      --up: #DC2626;
      --down: #059669;
      --selected: #F5F3FF;
      --shadow: 0 16px 42px rgba(30, 27, 46, .06);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .app { min-height: 100vh; display: grid; grid-template-rows: 56px 1fr; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 56px;
      background: var(--nav);
      color: #fff;
    }
    .topbar-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      padding: 0 22px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
      font-size: 18px;
      font-weight: 750;
      white-space: nowrap;
    }
    .brand-mark {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(139, 92, 246, .16);
      color: var(--secondary);
    }
    .brand-mark svg { width: 17px; height: 17px; }
    .nav-links { display: flex; align-items: center; gap: 6px; margin-right: auto; }
    .nav-link {
      height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 8px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      border: 1px solid transparent;
    }
    .nav-link:hover, .nav-link.active {
      color: #fff;
      background: rgba(124, 58, 237, .22);
      border-color: rgba(139, 92, 246, .35);
    }
    .search-wrap { position: relative; width: min(420px, 42vw); }
    .search-form {
      height: 38px;
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 8px;
    }
    .search-input {
      width: 100%;
      height: 38px;
      border: 1px solid rgba(237, 233, 245, .16);
      border-radius: 8px;
      outline: none;
      padding: 0 12px;
      color: #fff;
      background: rgba(255,255,255,.08);
    }
    .search-input::placeholder { color: rgba(255,255,255,.48); }
    .search-input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, .18);
    }
    .search-btn, .primary-btn {
      height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--primary-hover);
      color: #fff;
      font-weight: 650;
    }
    .search-btn:hover, .primary-btn:hover { background: var(--primary); }
    .search-panel {
      position: absolute;
      top: 46px;
      right: 0;
      width: min(520px, calc(100vw - 32px));
      max-height: 68vh;
      overflow: auto;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: none;
    }
    .search-panel.open { display: block; }
    .search-group { padding: 4px 0 10px; }
    .search-group h3 {
      margin: 8px 4px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 750;
    }
    .result {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      color: var(--text);
    }
    .result:hover { background: var(--selected); border-color: var(--tag-line); }
    .result-title { font-size: 14px; font-weight: 650; line-height: 1.45; }
    .result-meta { flex: none; color: var(--muted); font-size: 12px; }

    main { min-width: 0; }
    .view { padding: 18px 22px 36px; }
    .split {
      height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: minmax(330px, 35%) minmax(0, 65%);
      gap: 16px;
      padding: 16px 22px;
      overflow: hidden;
    }
    .panel {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(30, 27, 46, .035);
    }
    .left-panel { display: grid; grid-template-rows: auto 1fr; min-height: 0; }
    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3, p { margin-top: 0; }
    .panel-title { margin: 0; color: var(--text); font-size: 18px; font-weight: 800; }
    .subtle { color: var(--muted); font-size: 12px; }
    .news-list { overflow: auto; padding: 8px; }
    .news-card {
      position: relative;
      display: grid;
      gap: 9px;
      padding: 13px 13px 13px 15px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid transparent;
      border-radius: 12px;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }
    .news-card:hover { border-color: var(--tag-line); transform: translateY(-1px); }
    .news-card.selected {
      background: var(--selected);
      border-left-color: var(--primary);
      border-top-color: var(--tag-line);
      border-right-color: var(--tag-line);
      border-bottom-color: var(--tag-line);
    }
    .news-title {
      color: var(--text);
      font-size: 16px;
      font-weight: 750;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; min-width: 0; }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      max-width: 170px;
      padding: 3px 9px;
      border-radius: 16px;
      border: 1px solid var(--tag-line);
      background: var(--tag-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tag:hover { border-color: var(--secondary); background: #ECE7FF; }
    .stock-tag { color: var(--text); background: #fff; }
    .right-panel { overflow: auto; padding: 22px; }
    .placeholder {
      min-height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
    }
    .article { margin-bottom: 18px; }
    .article h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.35; font-weight: 800; }
    .article-body {
      margin-top: 16px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .analysis-card {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--tag-line);
      background: var(--selected);
    }
    .analysis-card h2 { margin: 0 0 14px; font-size: 18px; }
    .notice {
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--tag-line);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      font-size: 13px;
      font-weight: 650;
    }
    .chain-block {
      padding: 14px;
      border: 1px solid rgba(221,214,254,.8);
      border-radius: 12px;
      background: rgba(255,255,255,.74);
      margin-top: 12px;
    }
    .chain-title { margin: 0 0 12px; font-size: 16px; font-weight: 800; }
    .segment-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .segment {
      min-height: 128px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .segment h3 { margin: 0 0 10px; color: var(--primary); font-size: 14px; }
    .sector-line { margin: 10px 0 8px; font-size: 13px; font-weight: 750; }
    .more-row { padding: 10px 0 4px; text-align: center; }
    .ghost-btn {
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--tag-line);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      font-weight: 650;
    }
    .ghost-btn:hover { border-color: var(--secondary); background: var(--tag-bg); }

    .sectors-layout {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(360px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(30, 27, 46, .035);
    }
    .card-head { padding: 16px; border-bottom: 1px solid var(--line); }
    .card-head h1, .card-head h2 { margin: 0; font-size: 18px; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
    }
    .table th { color: var(--muted); font-weight: 750; background: #fff; }
    .table tr.clickable { cursor: pointer; }
    .table tr.clickable:hover { background: var(--tag-bg); }
    .table tr.selected-row { background: var(--selected); }
    .rank { font-family: var(--mono); color: var(--muted); }
    .rank.top { color: var(--primary); font-weight: 900; }
    .heat { color: var(--down); font-family: var(--mono); font-weight: 800; }
    .detail { padding: 18px; }
    .detail-title { margin: 0 0 6px; font-size: 24px; font-weight: 850; }
    .path { margin-bottom: 18px; color: var(--muted); font-size: 13px; }
    .list { display: grid; gap: 8px; }
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .list-row:hover { border-color: var(--tag-line); background: #FEFEFF; }
    .code, .num { font-family: var(--mono); color: var(--muted); }

    .stock-page { max-width: 1080px; margin: 0 auto; display: grid; gap: 16px; }
    .stock-hero { padding: 20px; }
    .stock-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .stock-name { margin: 0 0 4px; font-size: 24px; font-weight: 850; }
    .price { font-family: var(--mono); font-size: 32px; line-height: 1; font-weight: 900; }
    .change.up { color: var(--up); }
    .change.down { color: var(--down); }
    .chart {
      height: 220px;
      border: 1px dashed var(--tag-line);
      border-radius: 12px;
      background: var(--selected);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 650;
    }
    .section { padding: 18px; }
    .section h2 { margin: 0 0 12px; font-size: 18px; }
    .timeline { display: grid; gap: 0; }
    .timeline-item {
      position: relative;
      padding: 12px 0 12px 20px;
      border-left: 2px solid var(--tag-line);
    }
    .timeline-item::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 18px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }
    .timeline-title { font-weight: 750; line-height: 1.5; }
    .timeline-title:hover { color: var(--primary); }

    .loader, .empty, .error { padding: 34px 16px; color: var(--muted); text-align: center; }
    .error { color: var(--up); }
    .skeleton { display: grid; gap: 10px; padding: 12px; }
    .sk-line, .sk-block {
      overflow: hidden;
      position: relative;
      border-radius: 8px;
      background: #F0EEF6;
    }
    .sk-line { height: 14px; }
    .sk-block { height: 92px; }
    .sk-line::after, .sk-block::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.72), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.25s infinite;
    }
    @keyframes shimmer { to { transform: translateX(100%); } }

    @media (max-width: 900px) {
      .topbar-inner { padding: 0 12px; gap: 10px; }
      .brand { min-width: auto; }
      .brand span:last-child { display: none; }
      .nav-links { display: none; }
      .search-wrap { width: min(520px, 100%); }
      .search-form { grid-template-columns: 1fr 64px; }
      .split { height: auto; min-height: calc(100vh - 56px); grid-template-columns: 1fr; overflow: visible; padding: 12px; }
      .left-panel { min-height: 440px; }
      .right-panel { min-height: 420px; }
      .sectors-layout { grid-template-columns: 1fr; }
      .view { padding: 12px; }
      .segment-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .search-btn { font-size: 13px; padding: 0 8px; }
      .table th:nth-child(3), .table td:nth-child(3) { display: none; }
      .stock-top { display: grid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="#/">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 15l5-5 4 4 7-8" />
              <path d="M15 6h5v5" />
            </svg>
          </span>
          <span>In Motion</span>
        </a>
        <nav class="nav-links" aria-label="主导航">
          <a class="nav-link" data-route="news" href="#/">新闻分析</a>
          <a class="nav-link" data-route="sectors" href="#/sectors">板块热度</a>
        </nav>
        <div class="search-wrap">
          <form class="search-form" id="searchForm">
            <input class="search-input" id="searchInput" type="search" placeholder="搜索板块、股票、新闻" autocomplete="off" />
            <button class="search-btn" type="submit">搜索</button>
          </form>
          <div class="search-panel" id="searchPanel" aria-live="polite"></div>
        </div>
      </div>
    </header>
    <main id="app"></main>
  </div>

  <script>
    const API_BASE = window.IN_MOTION_API_BASE || "http://localhost:8000";

    const state = {
      route: "",
      news: [],
      newsOffset: 0,
      newsLimit: 50,
      newsLoading: false,
      newsDone: false,
      selectedNewsId: null,
      selectedSectorId: null,
      aborters: new Set()
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const app = $("#app");
    const searchInput = $("#searchInput");
    const searchPanel = $("#searchPanel");

    function endpoint(path) {
      return API_BASE.replace(/\/$/, "") + path;
    }

    async function api(path, options = {}) {
      const controller = new AbortController();
      state.aborters.add(controller);
      try {
        const response = await fetch(endpoint(path), { ...options, signal: controller.signal });
        if (!response.ok) throw new Error("HTTP " + response.status);
        return await response.json();
      } finally {
        state.aborters.delete(controller);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function formatTime(value) {
      if (!value) return "刚刚";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).slice(0, 16);
      const diff = Date.now() - date.getTime();
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;
      if (diff >= 0 && diff < minute) return "刚刚";
      if (diff >= 0 && diff < hour) return Math.floor(diff / minute) + "分钟前";
      if (diff >= 0 && diff < day) return Math.floor(diff / hour) + "小时前";
      return date.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function metaLine(item) {
      return `${escapeHtml(item.source || "未知来源")}·${escapeHtml(formatTime(item.published_at))}`;
    }

    function setActiveNav() {
      const hash = location.hash || "#/";
      document.querySelectorAll(".nav-link").forEach(link => {
        const route = link.dataset.route;
        link.classList.toggle("active", route === "sectors" ? hash.startsWith("#/sectors") || hash.startsWith("#/sector/") : hash === "#/" || hash.startsWith("#/news"));
      });
    }

    function skeleton(lines = 3, block = false) {
      const lineHtml = Array.from({ length: lines }, (_, index) => `<div class="sk-line" style="width:${index === 0 ? 92 : 66}%"></div>`).join("");
      return `<div class="skeleton">${block ? '<div class="sk-block"></div>' : ""}${lineHtml}</div>`;
    }

    function tagsHtml(sectors = [], max = 3) {
      const shown = sectors.slice(0, max).map(sector => (
        `<a class="tag" href="#/sector/${encodeURIComponent(sector.id)}" data-stop>${escapeHtml(sector.name)}</a>`
      ));
      if (sectors.length > max) shown.push(`<span class="tag">+${sectors.length - max}</span>`);
      return shown.join("");
    }

    function stockTag(stock) {
      const code = stock.code ? ` ${escapeHtml(stock.code)}` : "";
      return `<a class="tag stock-tag" href="#/stock/${encodeURIComponent(stock.code || stock.name)}">${escapeHtml(stock.name || stock.code)}${code}</a>`;
    }

    function renderNewsShell() {
      app.innerHTML = `
        <section class="split">
          <aside class="panel left-panel">
            <div class="panel-head">
              <h1 class="panel-title">今日快讯</h1>
              <button class="ghost-btn" id="crawlBtn" type="button">抓取新闻</button>
            </div>
            <div class="news-list" id="newsList"></div>
          </aside>
          <section class="panel right-panel" id="newsDetail">
            <div class="placeholder">点击左侧新闻，查看产业链影响分析</div>
          </section>
        </section>`;
      $("#newsList").addEventListener("scroll", onNewsScroll);
      $("#crawlBtn").addEventListener("click", crawlNews);
      renderNewsList();
      if (!state.news.length) loadMoreNews();
    }

    function renderNewsList() {
      const list = $("#newsList");
      if (!list) return;
      const cards = state.news.map(item => `
        <article class="news-card ${Number(item.id) === Number(state.selectedNewsId) ? "selected" : ""}" data-news-id="${escapeHtml(item.id)}">
          <div class="news-title">${escapeHtml(item.title)}</div>
          <div class="meta">${metaLine(item)}</div>
          <div class="tags">${tagsHtml(item.sectors || [])}</div>
        </article>`).join("");
      list.innerHTML = cards + (state.newsLoading ? skeleton(2, true) : "") +
        (!state.news.length && !state.newsLoading ? '<div class="empty">暂无新闻数据</div>' : "") +
        (state.newsDone && state.news.length ? '<div class="empty">已加载全部快讯</div>' : '<div class="more-row"><button class="ghost-btn" id="loadMoreBtn">加载更多</button></div>');
      list.querySelectorAll(".news-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("[data-stop]")) return;
          selectNews(card.dataset.newsId);
        });
      });
      $("#loadMoreBtn")?.addEventListener("click", loadMoreNews);
    }

    async function loadMoreNews() {
      if (state.newsLoading || state.newsDone) return;
      state.newsLoading = true;
      renderNewsList();
      try {
        const rows = await api(`/api/news?limit=${state.newsLimit}&offset=${state.newsOffset}`);
        state.news.push(...rows);
        state.newsOffset += rows.length;
        state.newsDone = rows.length < state.newsLimit;
      } catch (error) {
        $("#newsList").innerHTML = `<div class="error">新闻加载失败，请确认后端服务已启动。</div>`;
      } finally {
        state.newsLoading = false;
        renderNewsList();
      }
    }

    function onNewsScroll(event) {
      const el = event.currentTarget;
      if (el.scrollTop + el.clientHeight >= el.scrollHeight - 80) loadMoreNews();
    }

    async function crawlNews() {
      const btn = $("#crawlBtn");
      btn.disabled = true;
      btn.textContent = "抓取中...";
      try {
        const result = await api("/api/crawl", { method: "POST" });
        state.news = [];
        state.newsOffset = 0;
        state.newsDone = false;
        await loadMoreNews();
        btn.textContent = `新增 ${result.inserted || 0}`;
      } catch (error) {
        btn.textContent = "抓取失败";
      } finally {
        setTimeout(() => { btn.disabled = false; btn.textContent = "抓取新闻"; }, 1400);
      }
    }

    async function selectNews(newsId) {
      state.selectedNewsId = Number(newsId);
      if (location.hash !== "#/" && !location.hash.startsWith("#/news/")) location.hash = "#/";
      renderNewsList();
      const detail = $("#newsDetail");
      detail.innerHTML = skeleton(4, true);
      try {
        const [news, analysis] = await Promise.all([
          api(`/api/news/${encodeURIComponent(newsId)}`),
          api(`/api/analyze?news_id=${encodeURIComponent(newsId)}`)
        ]);
        renderNewsDetail(news, analysis);
      } catch (error) {
        detail.innerHTML = `<div class="error">详情或分析加载失败，请稍后重试。</div>`;
      }
    }

    function renderNewsDetail(news, analysis) {
      const detail = $("#newsDetail");
      detail.innerHTML = `
        <article class="article">
          <h1>${escapeHtml(news.title)}</h1>
          <div class="meta">${metaLine(news)}</div>
          <div class="tags" style="margin-top:12px">${tagsHtml(news.sectors || [], 8)}</div>
          <div class="article-body">${escapeHtml(news.content || news.summary || "暂无正文")}</div>
        </article>
        ${renderAnalysis(analysis)}`;
    }

    function renderAnalysis(analysis) {
      if (!analysis || analysis.match_type === "无匹配" || !(analysis.affected_chains || []).length) {
        return `<section class="analysis-card"><h2>产业链影响分析</h2><div class="empty">该新闻暂未匹配到相关产业链</div></section>`;
      }
      const positionName = { upstream: "上游", midstream: "中游", downstream: "下游" };
      const chains = analysis.affected_chains.map(chain => {
        const segments = ["upstream", "midstream", "downstream"].map(position => {
          const matches = (chain.segments || []).filter(seg => seg.position === position);
          const body = matches.length ? matches.map(seg => `
            <div class="sector-line">${escapeHtml(seg.segment_name || positionName[position])}</div>
            ${(seg.sectors || []).map(sector => `
              <div style="margin-bottom:10px">
                <a class="tag" href="#/sector/${encodeURIComponent(sector.sector_id || sector.id || sector.sector_name)}">${escapeHtml(sector.sector_name || sector.name)}</a>
                <div class="tags" style="margin-top:8px">${(sector.stocks || []).map(stockTag).join("") || '<span class="subtle">暂无关联股票</span>'}</div>
              </div>`).join("")}`).join("") : '<div class="subtle">暂无影响板块</div>';
          return `<div class="segment"><h3>${positionName[position]}</h3>${body}</div>`;
        }).join("");
        return `<div class="chain-block"><h3 class="chain-title">${escapeHtml(chain.chain_name)}</h3><div class="segment-grid">${segments}</div></div>`;
      }).join("");
      const notice = analysis.match_type === "技术映射" ? '<div class="notice">基于技术原理的关联分析</div>' : "";
      return `<section class="analysis-card"><h2>产业链影响分析</h2>${notice}${chains}</section>`;
    }

    async function renderSectorsView() {
      app.innerHTML = `
        <section class="view sectors-layout">
          <div class="card">
            <div class="card-head"><h1>板块热度排行</h1></div>
            <div id="sectorTable">${skeleton(4, true)}</div>
          </div>
          <div class="card">
            <div class="card-head"><h2>板块详情</h2></div>
            <div class="detail" id="sectorDetail"><div class="placeholder" style="min-height:360px">选择左侧板块查看关联股票与新闻</div></div>
          </div>
        </section>`;
      try {
        const rows = await api("/api/sectors/trending?limit=20");
        renderSectorTable(rows);
        const initialId = state.selectedSectorId || rows[0]?.id;
        if (initialId) selectSector(initialId, false);
      } catch (error) {
        $("#sectorTable").innerHTML = '<div class="error">板块热度加载失败</div>';
      }
    }

    function renderSectorTable(rows) {
      if (!rows.length) {
        $("#sectorTable").innerHTML = '<div class="empty">暂无热度数据</div>';
        return;
      }
      $("#sectorTable").innerHTML = `
        <table class="table">
          <thead><tr><th>排名</th><th>板块名称</th><th>所属产业链</th><th>24h新闻热度</th></tr></thead>
          <tbody>
            ${rows.map((row, index) => `
              <tr class="clickable ${Number(row.id) === Number(state.selectedSectorId) ? "selected-row" : ""}" data-sector-id="${escapeHtml(row.id)}">
                <td><span class="rank ${index < 3 ? "top" : ""}">${index + 1}</span></td>
                <td><strong>${escapeHtml(row.name)}</strong></td>
                <td>${escapeHtml(row.chain_name || "-")}</td>
                <td><span class="heat">↑ ${escapeHtml(row.news_count || 0)}</span></td>
              </tr>`).join("")}
          </tbody>
        </table>`;
      $("#sectorTable").querySelectorAll("tr[data-sector-id]").forEach(row => {
        row.addEventListener("click", () => selectSector(row.dataset.sectorId, true));
      });
    }

    async function selectSector(sectorId, updateHash = true) {
      state.selectedSectorId = Number(sectorId);
      if (updateHash) location.hash = "#/sector/" + encodeURIComponent(sectorId);
      document.querySelectorAll("tr[data-sector-id]").forEach(row => row.classList.toggle("selected-row", Number(row.dataset.sectorId) === Number(sectorId)));
      $("#sectorDetail").innerHTML = skeleton(4, true);
      try {
        const payload = await api(`/api/sectors/${encodeURIComponent(sectorId)}`);
        const sector = payload.sector || payload;
        const stocks = payload.stocks || sector.stocks || [];
        const news = payload.news || sector.news || [];
        $("#sectorDetail").innerHTML = `
          <h1 class="detail-title">${escapeHtml(sector.name)}</h1>
          <div class="path">${escapeHtml(sector.chain_name || "-")} → ${escapeHtml(positionLabel(sector.position))} → ${escapeHtml(sector.segment_name || "-")}</div>
          <section style="margin-bottom:20px">
            <h2 class="panel-title" style="font-size:16px;margin-bottom:10px">关联股票</h2>
            <div class="list">${stocks.length ? stocks.map(stock => `
              <a class="list-row" href="#/stock/${encodeURIComponent(stock.code)}">
                <span><strong>${escapeHtml(stock.name)}</strong> <span class="code">${escapeHtml(stock.code)}</span></span>
                <span class="tag">${escapeHtml(stock.relevance || "关联")}</span>
              </a>`).join("") : '<div class="empty">暂无关联股票</div>'}</div>
          </section>
          <section>
            <h2 class="panel-title" style="font-size:16px;margin-bottom:10px">相关新闻</h2>
            <div class="list">${news.length ? news.map(item => `
              <a class="list-row" href="#/news/${encodeURIComponent(item.id)}">
                <span>${escapeHtml(item.title)}</span>
                <span class="result-meta">${escapeHtml(formatTime(item.published_at))}</span>
              </a>`).join("") : '<div class="empty">暂无相关新闻</div>'}</div>
          </section>`;
      } catch (error) {
        $("#sectorDetail").innerHTML = '<div class="error">板块详情加载失败</div>';
      }
    }

    function positionLabel(position) {
      return ({ upstream: "上游", midstream: "中游", downstream: "下游" })[position] || position || "-";
    }

    async function renderStockView(code) {
      app.innerHTML = `<section class="view stock-page"><div class="card stock-hero">${skeleton(4, true)}</div></section>`;
      try {
        const payload = await api(`/api/stocks/${encodeURIComponent(code)}`);
        const stock = payload.stock || payload;
        const news = payload.news || stock.news || [];
        const change = Number(stock.change_pct ?? stock.changePercent ?? 1.26);
        const price = stock.price || stock.current_price || "--";
        app.innerHTML = `
          <section class="view stock-page">
            <div class="card stock-hero">
              <div class="stock-top">
                <div>
                  <h1 class="stock-name">${escapeHtml(stock.name || code)}</h1>
                  <div class="code">${escapeHtml(stock.code || code)}</div>
                </div>
                <div style="text-align:right">
                  <div class="price">${escapeHtml(price)}</div>
                  <div class="change ${change >= 0 ? "up" : "down"}">${change >= 0 ? "+" : ""}${change.toFixed ? change.toFixed(2) : change}%</div>
                </div>
              </div>
              <div class="chart">行情数据接入中...</div>
            </div>
            <section class="card section">
              <h2>公司介绍</h2>
              <p style="line-height:1.85;color:var(--muted);margin-bottom:0">${escapeHtml(stock.company_intro || "该公司为A股产业链相关标的，页面已预留公告、年报、主营业务和行情数据接入能力。")}</p>
            </section>
            <section class="card section">
              <h2>所属板块</h2>
              <div class="tags"><a class="tag" href="#/sector/${encodeURIComponent(stock.sector_id || "")}">${escapeHtml(stock.sector_name || "未分类")}</a></div>
              <div class="path" style="margin:10px 0 0">${escapeHtml(stock.chain_name || "-")} → ${escapeHtml(positionLabel(stock.position))} → ${escapeHtml(stock.segment_name || "-")}</div>
            </section>
            <section class="card section">
              <h2>相关新闻</h2>
              <div class="timeline">${news.length ? news.map(item => `
                <a class="timeline-item" href="#/news/${encodeURIComponent(item.id)}">
                  <div class="timeline-title">${escapeHtml(item.title)}</div>
                  <div class="subtle">${escapeHtml(item.source || "")} · ${escapeHtml(formatTime(item.published_at))}</div>
                </a>`).join("") : '<div class="empty">暂无相关新闻</div>'}</div>
            </section>
          </section>`;
      } catch (error) {
        app.innerHTML = `<section class="view"><div class="card error">股票详情加载失败</div></section>`;
      }
    }

    async function renderNewsRoute(newsId) {
      renderNewsShell();
      await selectNews(newsId);
    }

    async function runSearch(query) {
      const q = query.trim();
      if (!q) {
        searchPanel.classList.remove("open");
        searchPanel.innerHTML = "";
        return;
      }
      searchPanel.classList.add("open");
      searchPanel.innerHTML = skeleton(3);
      try {
        const result = await api(`/api/search?q=${encodeURIComponent(q)}&limit=20`);
        searchPanel.innerHTML = renderSearchResults(result);
      } catch (error) {
        searchPanel.innerHTML = '<div class="error">搜索失败，请稍后重试</div>';
      }
    }

    function renderSearchResults(result) {
      const group = (title, rows, mapper) => `
        <div class="search-group"><h3>${title}</h3>
          ${rows.length ? rows.map(mapper).join("") : '<div class="empty" style="padding:10px">无结果</div>'}
        </div>`;
      return group("板块", result.sectors || [], item => `
          <a class="result" href="#/sector/${encodeURIComponent(item.id)}">
            <span class="result-title">${escapeHtml(item.name)}</span><span class="result-meta">${escapeHtml(item.chain_name || "")}</span>
          </a>`) +
        group("股票", result.stocks || [], item => `
          <a class="result" href="#/stock/${encodeURIComponent(item.code)}">
            <span class="result-title">${escapeHtml(item.name)}</span><span class="result-meta">${escapeHtml(item.code)}</span>
          </a>`) +
        group("新闻", result.news || [], item => `
          <a class="result" href="#/news/${encodeURIComponent(item.id)}">
            <span class="result-title">${escapeHtml(item.title)}</span><span class="result-meta">${escapeHtml(item.source || "")} · ${escapeHtml(formatTime(item.published_at))}</span>
          </a>`);
    }

    function router() {
      setActiveNav();
      searchPanel.classList.remove("open");
      const hash = location.hash || "#/";
      const parts = hash.replace(/^#\/?/, "").split("/").filter(Boolean);
      const [view, id] = parts;
      if (!view) {
        state.route = "news";
        renderNewsShell();
        return;
      }
      if (view === "news" && id) {
        state.route = "news-detail";
        renderNewsRoute(id);
        return;
      }
      if (view === "sectors") {
        state.route = "sectors";
        renderSectorsView();
        return;
      }
      if (view === "sector" && id) {
        state.route = "sector-detail";
        state.selectedSectorId = Number(id);
        renderSectorsView();
        return;
      }
      if (view === "stock" && id) {
        state.route = "stock";
        renderStockView(id);
        return;
      }
      location.hash = "#/";
    }

    $("#searchForm").addEventListener("submit", event => {
      event.preventDefault();
      runSearch(searchInput.value);
    });
    searchInput.addEventListener("input", event => {
      window.clearTimeout(searchInput._timer);
      searchInput._timer = window.setTimeout(() => runSearch(event.target.value), 260);
    });
    document.addEventListener("click", event => {
      if (!event.target.closest(".search-wrap")) searchPanel.classList.remove("open");
    });
    window.addEventListener("hashchange", router);
    router();
  </script>
</body>
</html>
